version: '3.9'
services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    volumes:
      - ../backend:/app
      - ../data:/data
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    volumes:
      - ../frontend:/app
    working_dir: /app
    command: npm run dev -- --host
